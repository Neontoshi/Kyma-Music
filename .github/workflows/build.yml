name: Build

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: Kyma_Backend -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Kyma_Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix Kyma_Frontend

      - name: Build Tauri app (Linux)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: Kyma_Backend
          args: --bundle deb,rpm

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kyma-linux
          path: |
            Kyma_Backend/target/release/bundle/deb/*.deb
            Kyma_Backend/target/release/bundle/rpm/*.rpm

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: Kyma_Backend -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Kyma_Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix Kyma_Frontend

      - name: Build Tauri app (Windows)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: Kyma_Backend
          args: --bundle nsis,msi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kyma-windows
          path: |
            Kyma_Backend/target/release/bundle/nsis/*.exe
            Kyma_Backend/target/release/bundle/msi/*.msi

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust (with Apple Silicon target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: Kyma_Backend -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Kyma_Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix Kyma_Frontend

      - name: Build Tauri app (macOS Intel)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: Kyma_Backend
          args: --target x86_64-apple-darwin --bundle dmg,app

      - name: Build Tauri app (macOS Apple Silicon)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: Kyma_Backend
          args: --target aarch64-apple-darwin --bundle dmg,app

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kyma-macos
          path: |
            Kyma_Backend/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            Kyma_Backend/target/x86_64-apple-darwin/release/bundle/macos/*.app
            Kyma_Backend/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            Kyma_Backend/target/aarch64-apple-darwin/release/bundle/macos/*.app

  create-release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/kyma-linux/*.deb
            artifacts/kyma-linux/*.rpm
            artifacts/kyma-windows/*.exe
            artifacts/kyma-windows/*.msi
            artifacts/kyma-macos/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
