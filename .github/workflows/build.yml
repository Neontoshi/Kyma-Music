name: Build
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

# Permissions at the root level
permissions:
  contents: write
  actions: read

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libasound2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: Kyma_Backend -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Kyma_Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix Kyma_Frontend

      - name: Write signing key to file
        run: |
          mkdir -p ~/.tauri
          echo "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" > ~/.tauri/kyma.key

      - name: Build Tauri app (Linux)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: Kyma_Backend
          args: --bundles deb,rpm
          tagName: ${{ github.ref_name }}
          releaseName: "Kyma ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: ~/.tauri/kyma.key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kyma-linux
          path: |
            Kyma_Backend/target/release/bundle/deb/*.deb
            Kyma_Backend/target/release/bundle/deb/*.sig
            Kyma_Backend/target/release/bundle/rpm/*.rpm
            Kyma_Backend/target/release/bundle/rpm/*.sig

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: Kyma_Backend -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Kyma_Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix Kyma_Frontend

      - name: Write signing key to file
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.tauri"
          echo "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" > "$env:USERPROFILE\.tauri\kyma.key"
        shell: pwsh

      - name: Build Tauri app (Windows)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: Kyma_Backend
          args: --bundles nsis,msi
          tagName: ${{ github.ref_name }}
          releaseName: "Kyma ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: $env:USERPROFILE\.tauri\kyma.key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kyma-windows
          path: |
            Kyma_Backend/target/release/bundle/nsis/*.exe
            Kyma_Backend/target/release/bundle/nsis/*.sig
            Kyma_Backend/target/release/bundle/msi/*.msi
            Kyma_Backend/target/release/bundle/msi/*.sig

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust (with Apple Silicon target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: Kyma_Backend -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Kyma_Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix Kyma_Frontend

      - name: Write signing key to file
        run: |
          mkdir -p ~/.tauri
          echo "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" > ~/.tauri/kyma.key

      - name: Build Tauri app (macOS Intel)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: Kyma_Backend
          args: --target x86_64-apple-darwin --bundles dmg,app
          tagName: ${{ github.ref_name }}
          releaseName: "Kyma ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: ~/.tauri/kyma.key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Tauri app (macOS Apple Silicon)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: Kyma_Backend
          args: --target aarch64-apple-darwin --bundles dmg,app
          tagName: ${{ github.ref_name }}
          releaseName: "Kyma ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PATH: ~/.tauri/kyma.key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kyma-macos
          path: |
            Kyma_Backend/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            Kyma_Backend/target/x86_64-apple-darwin/release/bundle/dmg/*.sig
            Kyma_Backend/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            Kyma_Backend/target/aarch64-apple-darwin/release/bundle/dmg/*.sig

  create-release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.sig
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
