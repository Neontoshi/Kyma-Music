name: Build LauvPlayer

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================
  # Linux Build
  # ============================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libssl-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libasound2-dev libpipewire-0.3-dev \
            pkg-config

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Lauv_Frontend/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: Lauv_Backend

      - name: Build Frontend
        run: |
          cd Lauv_Frontend
          npm ci
          npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Build Tauri App
        working-directory: Lauv_Backend
        run: cargo tauri build

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: lauvplayer-linux
          path: Lauv_Backend/target/release/bundle/appimage/*.AppImage

      - name: Upload Linux deb
        uses: actions/upload-artifact@v4
        with:
          name: lauvplayer-linux-deb
          path: Lauv_Backend/target/release/bundle/deb/*.deb

  # ============================================
  # Windows Build
  # ============================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Lauv_Frontend/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: Lauv_Backend

      - name: Build Frontend
        run: |
          cd Lauv_Frontend
          npm ci
          npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Build Tauri App
        working-directory: Lauv_Backend
        run: cargo tauri build

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: lauvplayer-windows
          path: Lauv_Backend/target/release/bundle/msi/*.msi

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: lauvplayer-windows-exe
          path: Lauv_Backend/target/release/bundle/nsis/*.exe

  # ============================================
  # macOS Build
  # ============================================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Lauv_Frontend/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: Lauv_Backend

      - name: Build Frontend
        run: |
          cd Lauv_Frontend
          npm ci
          npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Build Tauri App
        working-directory: Lauv_Backend
        run: cargo tauri build

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: lauvplayer-macos
          path: Lauv_Backend/target/release/bundle/dmg/*.dmg

  # ============================================
  # Windows Portable Bundle (with yt-dlp + ffmpeg)
  # ============================================
  bundle-windows-deps:
    runs-on: ubuntu-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows executable
        uses: actions/download-artifact@v4
        with:
          name: lauvplayer-windows-exe
          path: bundle/

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip p7zip-full

      - name: Download yt-dlp
        run: |
          wget -q "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -O bundle/yt-dlp.exe

      - name: Download ffmpeg
        run: |
          wget -q "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -O /tmp/ffmpeg.zip
          unzip -q /tmp/ffmpeg.zip -d /tmp/ffmpeg
          find /tmp/ffmpeg -name "ffmpeg.exe" -exec cp {} bundle/ \;

      - name: Create launcher
        run: |
          cat > bundle/run-lauvplayer.bat << 'EOF'
          @echo off
          title LauvPlayer
          echo Starting LauvPlayer...
          lauv-player.exe
          pause
          EOF

      - name: Create ZIP
        run: |
          cd bundle
          zip -r ../LauvPlayer-Windows-Portable.zip .

      - name: Upload Portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: lauvplayer-windows-portable
          path: LauvPlayer-Windows-Portable.zip

  # ============================================
  # Create Release
  # ============================================
  create-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos, bundle-windows-deps]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/lauvplayer-linux/*.AppImage
            artifacts/lauvplayer-linux-deb/*.deb
            artifacts/lauvplayer-windows/*.msi
            artifacts/lauvplayer-windows-portable/*.zip
            artifacts/lauvplayer-macos/*.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
