name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Kyma_Frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd Kyma_Frontend
          npm ci

      - name: Build Tauri app
        run: |
          cd Kyma_Backend
          cargo tauri build

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kyma-linux
          path: |
            Kyma_Backend/target/release/bundle/deb/*.deb
            Kyma_Backend/target/release/bundle/appimage/*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Kyma_Frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd Kyma_Frontend
          npm ci

      - name: Build Tauri app
        run: |
          cd Kyma_Backend
          cargo tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kyma-windows
          path: |
            Kyma_Backend/target/release/bundle/nsis/*.exe
            Kyma_Backend/target/release/bundle/msi/*.msi

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          target: aarch64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Kyma_Frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd Kyma_Frontend
          npm ci

      - name: Install macOS dependencies
        run: |
          brew install cmake
          brew install ffmpeg

      - name: Build Tauri app (Intel)
        run: |
          cd Kyma_Backend
          cargo tauri build --target x86_64-apple-darwin

      - name: Build Tauri app (Apple Silicon)
        run: |
          cd Kyma_Backend
          cargo tauri build --target aarch64-apple-darwin

      - name: Create universal binary (optional)
        run: |
          cd Kyma_Backend
          # Combine Intel and ARM builds into a universal binary
          lipo -create \
            target/x86_64-apple-darwin/release/bundle/macos/kyma.app/Contents/MacOS/kyma \
            target/aarch64-apple-darwin/release/bundle/macos/kyma.app/Contents/MacOS/kyma \
            -output target/release/bundle/macos/kyma.app/Contents/MacOS/kyma 2>/dev/null || true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kyma-macos
          path: |
            Kyma_Backend/target/release/bundle/macos/*.app
            Kyma_Backend/target/x86_64-apple-darwin/release/bundle/macos/*.app
            Kyma_Backend/target/aarch64-apple-darwin/release/bundle/macos/*.app
            Kyma_Backend/target/release/bundle/dmg/*.dmg

  create-release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/kyma-linux/*.deb
            artifacts/kyma-linux/*.AppImage
            artifacts/kyma-windows/*.exe
            artifacts/kyma-windows/*.msi
            artifacts/kyma-macos/*.dmg
            artifacts/kyma-macos/*.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
