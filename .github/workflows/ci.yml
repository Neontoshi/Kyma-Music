name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev libpipewire-0.3-dev
      - name: Run tests
        run: |
          cd Kyma_Backend
          cargo test --no-fail-fast

  test-frontend:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: |
          cd Kyma_Frontend
          npm ci
      - name: Type check
        run: |
          cd Kyma_Frontend
          npx tsc --noEmit
      - name: Build
        run: |
          cd Kyma_Frontend
          npm run build

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev libpipewire-0.3-dev
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend deps
        run: |
          cd Kyma_Frontend
          npm ci
      - name: Build release
        run: |
          cd Kyma_Backend
          cargo build --release
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: kyma-linux
          path: Kyma_Backend/target/release/kyma
